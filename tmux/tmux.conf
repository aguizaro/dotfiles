##### PREFIX #####
unbind C-b
set -g prefix C-a
bind C-a send-prefix

##### BASICS #####
set -g mouse on
setw -g mode-keys emacs
set -g history-limit 100000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows off

##### WINDOWS #####
bind c new-window -a
bind -n S-Left previous-window
bind -n S-Right next-window

##### PANES #####
# Preferred splitting
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

##### COPY / SCROLL #####
unbind -T copy-mode MouseDragEnd1Pane
bind -T copy-mode MouseDragEnd1Pane send -X copy-selection
bind s copy-mode \; send-keys '?'

##### STATUS BAR ########
set -g status on
set -g status-interval 5
set -g status-style bg=colour237,fg=colour223
set -g status-left-length 30
set -g status-right-length 150

# Left: session name with small visual indicator if prefix is pressed
set -g status-left "\
#[fg=colour7,bg=colour241]#{?client_prefix,#[bg=colour167],} ❐ #S \
#[fg=colour241,bg=colour237]#{?client_prefix,#[fg=colour167],}#{?window_zoomed_flag, 🔍,}"

# Right: date/time with visual separators
set -g status-right "\
#[fg=colour214,bg=colour237] \
#[fg=colour246,bg=colour237]  %b %d %y\
#[fg=colour109]  %H:%M \
#[fg=colour248,bg=colour239]"

# Inactive windows, with visual separators and current window index/name displayed
set-window-option -g window-status-format "\
#[fg=colour237,bg=colour239,noitalics]\
#[fg=colour223,bg=colour239] #I \
#[fg=colour223,bg=colour239] #W \
#[fg=colour239,bg=colour237]"

# Active window
set-window-option -g window-status-current-format "\
#[fg=colour237,bg=colour214]\
#[fg=colour239,bg=colour214] #I \
#[fg=colour239,bg=colour214,bold] #W \
#[fg=colour214,bg=colour237]"

# Activity alert
set-window-option -g window-status-activity-style bg=colour237,fg=colour248

# Bell alert
set-window-option -g window-status-bell-style bg=colour167,fg=colour235
##### VISUALS #####
set -g pane-border-style fg=colour239
set -g pane-active-border-style fg=colour214
set -g message-style bg=colour239,fg=colour223

##### SSH FRIENDLY SETTINGS #####
set -g remain-on-exit on
set -g automatic-rename off
set -g allow-rename off
set -g history-limit 200000
set -g pane-border-status top
set -g pane-border-format "#{pane_index} #{pane_title}"

